name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > android/app/upload-keystore.jks

      - name: Create key.properties
        run: |
          cat > android/key.properties <<EOF
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ vars.KEY_ALIAS }}
          storeFile=upload-keystore.jks
          EOF

      - name: Check keystore
        run: |
            ls -l android/app/upload-keystore.jks
            keytool -list -keystore android/app/upload-keystore.jks \
            -storepass "${{ secrets.KEYSTORE_PASSWORD }}"

      - name: Build signed APK
        run: flutter build apk --release

      - name: Rename APK
        run: |
          TAG_NAME=${GITHUB_REF_NAME}
          mv build/app/outputs/flutter-apk/app-release.apk \
             build/app/outputs/flutter-apk/RepTimer-${TAG_NAME}.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: build/app/outputs/flutter-apk/RepTimer-${{ github.ref_name }}.apk