name: Release

on:
  workflow_dispatch:

  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > android/app/upload-keystore.jks

      - name: Create key.properties
        run: |
          cat > android/key.properties <<EOF
          storePassword=${KEYSTORE_PASSWORD}
          keyPassword=${KEY_PASSWORD}
          keyAlias=${KEY_ALIAS}
          storeFile=upload-keystore.jks
          EOF

          echo "Key alias: ${KEY_ALIAS}"
          echo "length of keystore password: ${#KEYSTORE_PASSWORD}"
          echo "length of key password: ${#KEY_PASSWORD}"
        env:
            KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
            KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
            KEY_ALIAS: ${{ vars.KEY_ALIAS }}

      - name: Debug keystore
        run: |
            ls -lh android/app/upload-keystore.jks
            sha256sum android/app/upload-keystore.jks

            echo "Password length: ${#KEYSTORE_PASSWORD}"

            echo "Password length: ${#KEY_PASSWORD}"

            keytool -list \
            -keystore android/app/upload-keystore.jks \
            -storepass "$KEYSTORE_PASSWORD"
        env:
            KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
            KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Build signed APK
        run: flutter build apk --release

      - name: Rename APK
        run: |
          TAG_NAME=${GITHUB_REF_NAME}
          mv build/app/outputs/flutter-apk/app-release.apk \
             build/app/outputs/flutter-apk/RepTimer-${TAG_NAME}.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: build/app/outputs/flutter-apk/RepTimer-${{ github.ref_name }}.apk